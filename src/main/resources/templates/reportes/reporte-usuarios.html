<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>Reporte de Usuarios</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: #333;
            margin: 30px;
        }
        .header {
            border-bottom: 3px solid #c0392b;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #c0392b;
            font-size: 22px;
            margin: 0 0 4px 0;
        }
        .header p {
            margin: 0;
            color: #777;
            font-size: 11px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th {
            background-color: #c0392b;
            color: #fff;
            padding: 8px 10px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 7px 10px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 11px;
        }
        tr:nth-child(even) td {
            background-color: #fafafa;
        }
        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
        }
        .badge-admin {
            background-color: #e74c3c;
            color: #fff;
        }
        .badge-user {
            background-color: #2980b9;
            color: #fff;
        }
        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: #aaa;
            text-align: right;
        }
        .summary {
            margin-bottom: 16px;
            font-size: 12px;
        }
        .summary span {
            font-weight: bold;
            color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>El y Ella Detalles — Reporte de Usuarios</h1>
        <p>Generado el: {{fecha}}</p>
    </div>

    <div class="summary">
        Total de usuarios registrados: <span>{{total}}</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Rol</th>
                <th>Fecha de Registro</th>
            </tr>
        </thead>
        <tbody>
            {{filas}}
        </tbody>
    </table>

    <div class="footer">
        El y Ella Detalles &mdash; Reporte generado automáticamente
    </div>

</body>
</html>
