spring:
  # ── Base de datos ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/db_flores
    username: elyella
    password: elyella123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# ── JWT ─────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:mi-clave-secreta-de-desarrollo-muy-larga-para-256-bits}

# ── Mercado Pago ─────────────────────────────────────────────────────────────
mercadopago:
  access-token: ${MP_ACCESS_TOKEN:TEST-token-de-desarrollo}
  webhook-secret: ${MP_WEBHOOK_SECRET:webhook-secret-de-desarrollo}
  notification-url: ${MP_NOTIFICATION_URL:http://localhost:8080/api/v1/payments/webhook}

# ── CORS ─────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: http://localhost:3000

# ── Cookie JWT ────────────────────────────────────────────────────────────────
cookie:
  secure: false
  same-site: Lax

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.elyella.backend: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
